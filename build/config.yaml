output_dir: public

directories:
  - assets/css
  - assets/img
  - assets/scripts
  - posts/src
  - posts/img

assets:
  - src: src/assets/css/stylesheet.css
    dest: assets/css/stylesheet.css
  - src: src/assets/css/skeleton.css
    dest: assets/css/skeleton.css
  - src: src/assets/img/openbsd-logo.svg
    dest: assets/img/openbsd-logo.svg
  - src: src/assets/img/php-logo.svg
    dest: assets/img/php-logo.svg
  - src: src/assets/scripts/track.php
    dest: assets/scripts/track.php
  - src: src/assets/img/mayo.webp
    dest: assets/img/mayo.webp

pages:
  - src: content/pages/about.md 
    dest: index.html
    title: About
    template: about.html.twig
  - src: content/pages/now.md
    dest: now.html
    title: Now
    template: now.html.twig
  - src: content/pages/colophon.md 
    dest: colophon.html
    title: Colophon
    template: colophon.html.twig
  - src: content/pages/contact.md
    dest: contact.html
    title: Contact
    template: contact.html.twig

posts: content/posts

posts_src:
  - src: content/posts/img/graph.png
    dest: posts/img/graph.png
  - src: content/posts/src/dice-game.scm
    dest: posts/src/dice-game.scm

post_index:
  src: src/pages/posts.html
  dest: posts.html
  title: Posts
  template: posts.html.twig