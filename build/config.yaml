output_dir: public

directories:
  - assets/css
  - assets/img
  - assets/scripts
  - posts/src
  - posts/img

assets:
  - src: src/assets/css/stylesheet.css
    dest: assets/css/stylesheet.css
  - src: src/assets/css/skeleton.css
    dest: assets/css/skeleton.css
  - src: src/assets/img/openbsd-logo.svg
    dest: assets/img/openbsd-logo.svg
  - src: src/assets/img/php-logo.svg
    dest: assets/img/php-logo.svg
  - src: src/assets/scripts/track.php
    dest: assets/scripts/track.php
  - src: src/assets/img/mayo.webp
    dest: assets/img/mayo.webp

pages:
  - src: src/pages/about.html 
    dest: index.html
    title: About
  - src: src/pages/now.html
    dest: now.html
    title: Now
  - src: src/pages/colophon.html 
    dest: colophon.html
    title: Colophon
  - src: src/pages/contact.html
    dest: contact.html
    title: Contact


posts_dir: blog/posts

posts:
  - src: blog/posts/img/demon-1.png
    dest: posts/img/demon-1.png
  - src: blog/posts/src/spitz-demon-1.scm
    dest: posts/src/spitz-demon-1.scm

post_index:
  src: src/pages/posts.html
  dest: posts.html
  title: Posts
