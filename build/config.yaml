output_dir: public

directories:
  - assets/css
  - assets/img
  - assets/img/maps
  - posts/src
  - posts/img

assets:
  - src: src/assets/css/stylesheet.css
    dest: assets/css/stylesheet.css
  - src: src/assets/css/skeleton.css
    dest: assets/css/skeleton.css
  - src: src/assets/img/favicon.png
    dest: assets/img/favicon.png
  - src: src/assets/img/hero.webp
    dest: assets/img/hero.webp
  - src: src/assets/img/openbsd-logo.svg
    dest: assets/img/openbsd-logo.svg
  - src: src/assets/img/php-logo.svg
    dest: assets/img/php-logo.svg
  - src: content/pages/src/maps/china.png
    dest: assets/img/maps/china.png
  - src: content/pages/src/maps/mexico.png
    dest: assets/img/maps/mexico.png
  - src: content/pages/src/maps/nyc.png
    dest: assets/img/maps/nyc.png
  - src: content/pages/src/maps/sanfrancisco.png
    dest: assets/img/maps/sanfrancisco.png
  - src: content/pages/src/maps/seattle.png
    dest: assets/img/maps/seattle.png
  - src: content/pages/src/maps/taipei.png
    dest: assets/img/maps/taipei.png

pages:
  - src: content/pages/about.md 
    dest: index.html
    title: About
    template: page.html.twig
  - src: content/pages/now.md
    dest: now.html
    title: Now
    template: page.html.twig
  - src: content/pages/maps.md
    dest: maps.html
    title: Maps
    template: page.html.twig
  - src: content/pages/colophon.md 
    dest: colophon.html
    title: Colophon
    template: colophon.html.twig
  - src: content/pages/contact.md
    dest: contact.html
    title: Contact
    template: page.html.twig

posts: content/posts

posts_src:

post_index:
  src: src/pages/posts.html
  dest: posts.html
  title: Posts
  template: posts.html.twig